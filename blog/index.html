<!DOCTYPE HTML>
<html lang="es">
<head>
    <title>Blog | Farahiso Films</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <!-- Cargamos Montserrat igual que en tu web -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #fff; margin: 0; padding: 0; }
        
        .main-wrapper { max-width: 1200px; margin: 0 auto; padding: 50px 20px; }
        
        .header-brand { text-align: center; margin-bottom: 60px; }
        .header-brand h1 { font-size: 2.5em; margin: 0; color: #000; font-weight: 700; }
        .header-brand h2 { font-size: 1.8em; margin: 10px auto; text-transform: uppercase; border-bottom: 2px solid #333; display: inline-block; padding-bottom: 5px; font-weight: 400; }
        
        /* Contenedor Gris */
        .blog-wrapper-grey { 
            background: #999; 
            padding: 40px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 40px; 
        }
        
        /* Tarjetas */
        .blog-card { 
            background: #fff; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            height: 100%;
            box-sizing: border-box;
        }
        .blog-card img { width: 100%; height: 250px; object-fit: cover; margin-bottom: 20px; }
        
        .blog-card h3 { font-size: 1.5em; margin: 15px 0 10px 0; color: #000; font-weight: 700; }
        .blog-card p { font-size: 1.1em; color: #555; line-height: 1.6; margin-bottom: 20px; font-weight: 300; }
        
        .btn-read { 
            display: inline-block; padding: 12px 20px; background: #000; color: #fff; 
            text-decoration: none; text-align: center; font-weight: bold; margin-top: auto;
            text-transform: uppercase; font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="header-brand">
            <h1><strong>Farahiso</strong> Films</h1>
            <h2>BLOG</h2>
        </div>
        <div class="blog-wrapper-grey" id="posts"></div>
    </div>

    <script>
        async function loadPosts() {
            const container = document.getElementById('posts');
            try {
                const res = await fetch('https://api.github.com/repos/farahisofilms/farahiso/contents/blog');
                const files = await res.json();
                
                for (const file of files.filter(f => f.name.endsWith('.md'))) {
                    const contentRes = await fetch(file.download_url);
                    const text = await contentRes.text();
                    
                    const title = (text.match(/title:\s*["']?([^"'\n]+)["']?/) || [])[1] || "Sin título";
                    const desc = (text.match(/description:\s*["']?([^"'\n]+)["']?/) || [])[1] || "Leer más...";
                    const thumb = (text.match(/thumbnail:\s*["']?([^"'\n]+)["']?/) || [])[1] || "assets/img/hero.png";
                    
                    container.innerHTML += `
                        <div class="blog-card">
                            <img src="${thumb}" alt="${title}">
                            <h3>${title}</h3>
                            <p>${desc}</p>
                            <a href="/blog/${file.name.replace('.md','')}" class="btn-read">Leer más</a>
                        </div>
                    `;
                }
            } catch (e) { console.error(e); }
        }
        loadPosts();
    </script>
</body>
</html>
