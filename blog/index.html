<!DOCTYPE HTML>
<html>
	<head>
		<title>Blog | Farahiso Films</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="/assets/css/main.css" />
		<noscript><link rel="stylesheet" href="/assets/css/noscript.css" /></noscript>
		<style>
			/* Estilos rápidos para las tarjetas de los artículos */
			.blog-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
				gap: 30px;
				margin-top: 40px;
			}
			.blog-card {
				background: #fff;
				border: 1px solid #e0e0e0;
				border-radius: 4px;
				overflow: hidden;
				display: flex;
				flex-direction: column;
			}
			.blog-card img {
				width: 100%;
				height: 200px;
				object-fit: cover;
			}
			.blog-card-content {
				padding: 20px;
			}
			.blog-card h3 {
				margin: 0 0 10px 0;
			}
			.blog-card p {
				font-size: 0.9em;
				color: #666;
			}
		</style>
	</head>
	<body class="is-preload">

		<!-- Wrapper -->
			<div id="wrapper">

				<!-- Header -->
					<header id="header">
						<a href="/" class="title">Farahiso Films</a>
						<nav>
							<ul>
								<li><a href="/">Inicio</a></li>
							</ul>
						</nav>
					</header>

				<!-- Main -->
					<section id="main" class="wrapper">
						<div class="inner">
							<h1 class="major">Blog</h1>
							<p>Publicaciones, historias detrás de las cámaras y consejos para tu gran día.</p>
							
							<!-- Aquí es donde el gestor visual irá pintando tus artículos automáticamente -->
							<div class="blog-grid" id="blog-posts-container">
								<!-- Las entradas se generarán aquí -->
							</div>

						</div>
					</section>

			</div>

		<!-- Scripts de la plantilla -->
			<script src="/assets/js/jquery.min.js"></script>
			<script src="/assets/js/jquery.scrollex.min.js"></script>
			<script src="/assets/js/jquery.scrolly.min.js"></script>
			<script src="/assets/js/browser.min.js"></script>
			<script src="/assets/js/breakpoints.min.js"></script>
			<script src="/assets/js/util.js"></script>
			<script src="/assets/js/main.js"></script>

	</body>
</html>
