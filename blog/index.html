<!DOCTYPE HTML>
<html>
	<head>
		<title>Blog | Farahiso Films</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="/assets/css/main.css" />
		<noscript><link rel="stylesheet" href="/assets/css/noscript.css" /></noscript>
		
		<!-- Decap CMS Identity Widget -->
		<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

		<style>
			/* Diseño Collage Transgresor y Cinematográfico */
			.blog-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
				gap: 40px;
				margin-top: 50px;
			}
			.blog-card {
				background: #1e1e1e; /* Fondo oscuro rompiendo con el minimalismo claro */
				border: 1px solid #333;
				border-radius: 0px; /* Cortes rectos, formato collage */
				overflow: hidden;
				display: flex;
				flex-direction: column;
				position: relative;
				transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
				box-shadow: 0px 0px 0px rgba(0,0,0,0);
				text-decoration: none !important;
				color: #fff !important;
			}
			.blog-card:nth-child(even) {
				transform: translateY(15px); /* Asimetría intencionada de collage */
			}
			.blog-card:hover {
				transform: translateY(-5px) scale(1.02);
				box-shadow: 10px 10px 0px #bca374; /* Superposición de color corporativo/dorado texturizado */
				border-color: #bca374;
			}
			.blog-card-img-wrapper {
				width: 100%;
				height: 240px;
				overflow: hidden;
				position: relative;
				background: #000;
			}
			.blog-card img {
				width: 100%;
				height: 100%;
				object-fit: cover;
				filter: grayscale(100%) contrast(110%); /* Efecto fotograma analógico */
				transition: filter 0.5s ease, transform 0.5s ease;
			}
			.blog-card:hover img {
				filter: grayscale(20%) contrast(100%);
				transform: scale(1.05);
			}
			.blog-card-content {
				padding: 25px;
				background: #1a1a1a;
				border-top: 1px solid #2a2a2a;
				flex-grow: 1;
				display: flex;
				flex-direction: column;
				justify-content: space-between;
			}
			.blog-card h3 {
				font-family: inherit;
				font-size: 1.4em;
				line-height: 1.2;
				margin: 0 0 12px 0;
				color: #fff;
				text-transform: uppercase;
				letter-spacing: 1px;
			}
			.blog-card p {
				font-size: 0.85em;
				color: #aaa;
				line-height: 1.6;
				margin-bottom: 20px;
			}
			.blog-meta {
				font-size: 0.75em;
				text-transform: uppercase;
				letter-spacing: 2px;
				color: #bca374;
				display: block;
			}
		</style>
	</head>
	<body class="is-preload">

		<!-- Wrapper -->
			<div id="wrapper">

				<!-- Header -->
					<header id="header">
						<a href="/" class="title">Farahiso Films</a>
						<nav>
							<ul>
								<li><a href="/">Inicio</a></li>
							</ul>
						</nav>
					</header>

				<!-- Main -->
					<section id="main" class="wrapper">
						<div class="inner">
							<h1 class="major">Blog</h1>
							<p>Publicaciones, historias detrás de las cámaras y fragmentos de realidad convertidos en cine.</p>
							
							<!-- Contenedor automatizado -->
							<div class="blog-grid" id="blog-posts-container" style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
								<!-- Cargando dinámicamente -->
							</div>

						</div>
					</section>

			</div>

		<!-- Scripts de la plantilla -->
			<script src="/assets/js/jquery.min.js"></script>
			<script src="/assets/js/jquery.scrollex.min.js"></script>
			<script src="/assets/js/jquery.scrolly.min.js"></script>
			<script src="/assets/js/browser.min.js"></script>
			<script src="/assets/js/breakpoints.min.js"></script>
			<script src="/assets/js/util.js"></script>
			<script src="/assets/js/main.js"></script>

		<!-- Motor dinámico para leer tus posts en formato Markdown -->
		<script>
			async function loadBlogPosts() {
				const container = document.getElementById('blog-posts-container');
				
				// Buscamos tus archivos dentro de la carpeta del repositorio
				const repoUrl = 'https://api.github.com/repos/farahisofilms/farahiso/contents/blog';
				
				try {
					const response = await fetch(repoUrl);
					const files = await response.json();
					
					// Filtramos solo los archivos que terminen en .md (tus artículos)
					const mdFiles = files.filter(file => file.name.endsWith('.md'));
					
					if(mdFiles.length === 0) {
						container.innerHTML = '<p>Próximamente nuevas historias...</p>';
						return;
					}
					
					container.innerHTML = ''; // Limpiamos cargando

					for (const file of mdFiles) {
						const fileResponse = await fetch(file.download_url);
						const content = await fileResponse.text();
						
						// Extraemos los datos del bloque superior (Frontmatter del CMS)
						const titleMatch = content.match(/title:\s*["']?([^"'\n]+)["']?/);
						const dateMatch = content.match(/date:\s*([^\n]+)/);
						const descMatch = content.match(/description:\s*["']?([^"'\n]+)["']?/);
						const thumbMatch = content.match(/thumbnail:\s*["']?([^"'\n]+)["']?/);
						
						const title = titleMatch ? titleMatch[1] : file.name.replace('.md', '');
						const description = descMatch ? descMatch[1] : 'Haz clic para descubrir la historia...';
						const thumbnail = thumbMatch ? thumbMatch[1] : '/assets/images/thumbs/default.jpg'; // Imagen por defecto por si no pones
						
						let formattedDate = '';
						if (dateMatch) {
							const dateObj = new Date(dateMatch[1]);
							formattedDate = dateObj.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
						}

						// Creamos la estructura visual limpia y rota (collage)
						const postNameWithoutExtension = file.name.replace('.md', '');
						const cardHtml = `
							<a href="/blog/${postNameWithoutExtension}" class="blog-card">
								<div class="blog-card-img-wrapper">
									<img src="${thumbnail}" alt="${title}">
								</div>
								<div class="blog-card-content">
									<div>
										<h3>${title}</h3>
										<p>${description}</p>
									</div>
									<span class="blog-meta">${formattedDate}</span>
								</div>
							</a>
						`;
						container.innerHTML += cardHtml;
					}
				} catch (error) {
					console.error("Error cargando artículos:", error);
					container.innerHTML = '<p>Error al conectar con los fragmentos de historias.</p>';
				}
			}

			// Arrancamos el cargador al entrar a la página
			document.addEventListener('DOMContentLoaded', loadBlogPosts);
		</script>
	</body>
</html>
