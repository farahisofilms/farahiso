<!DOCTYPE HTML>
<html>
	<head>
		<title>Blog | Farahiso Films</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="/assets/css/main.css" />
		<noscript><link rel="stylesheet" href="/assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">

		<!-- Wrapper -->
			<div id="wrapper">
				<header id="header">
					<a href="/" class="title">Farahiso Films</a>
					<nav>
						<ul>
							<li><a href="/">Inicio</a></li>
						</ul>
					</nav>
				</header>

				<section id="main" class="wrapper">
					<div class="inner">
						<h1 class="major">Blog</h1>
						<div id="blog-posts-container">
                            <!-- Aquí se inyectará el contenido -->
						</div>
					</div>
				</section>
			</div>

			<script src="/assets/js/jquery.min.js"></script>
			<script src="/assets/js/main.js"></script>
            
            <script>
                async function loadPosts() {
                    const container = document.getElementById('blog-posts-container');
                    const res = await fetch('https://api.github.com/repos/farahisofilms/farahiso/contents/blog');
                    const files = await res.json();
                    
                    for (const file of files.filter(f => f.name.endsWith('.md'))) {
                        const contentRes = await fetch(file.download_url);
                        const text = await contentRes.text();
                        // Extraemos el título simple
                        const title = text.match(/title:\s*["']?([^"'\n]+)["']?/) ? text.match(/title:\s*["']?([^"'\n]+)["']?/)[1] : file.name;
                        
                        container.innerHTML += `<section><a href="/blog/${file.name.replace('.md','')}"><h2>${title}</h2></a></section>`;
                    }
                }
                loadPosts();
            </script>
	</body>
</html>
