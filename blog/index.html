<!DOCTYPE HTML>
<html lang="es">
<head>
    <title>Blog | Farahiso Films</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #fff; margin: 0; padding: 0; }
        .main-wrapper { max-width: 1000px; margin: 0 auto; padding: 50px 20px; }
        
        .header-brand { text-align: center; margin-bottom: 40px; }
        .header-brand h1 { font-size: 2.5em; margin: 0; color: #000; font-weight: 300; letter-spacing: -1px; }
        .header-brand h1 strong { font-weight: 700; }
        .header-brand h2 { font-size: 1.2em; margin: 10px auto; text-transform: uppercase; border-bottom: 2px solid #333; display: inline-block; padding-bottom: 5px; font-weight: 400; letter-spacing: 2px; }
        
        /* Grid adaptable: 3 en escritorio, 1 en móvil */
        .blog-wrapper-grey { background: #999; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .blog-card { background: #fff; padding: 20px; display: flex; flex-direction: column; }
        .blog-card img { width: 100%; height: 200px; object-fit: cover; margin-bottom: 15px; }
        
        /* Estilo Post Único */
        .post-single { text-align: left; padding: 0 10px; }
        .post-single h1 { font-size: 2.5em; margin-bottom: 20px; }
        .featured-img { width: 100%; height: auto; margin-bottom: 30px; }
        .post-body { font-size: 1.1em; line-height: 1.6; color: #333; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #000; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="header-brand">
            <a href="/" style="text-decoration: none; color: inherit;"><h1><strong>Farahiso</strong> Films</h1></a>
            <h2>BLOG</h2>
        </div>
        <div id="content"></div>
    </div>

    <script>
        const contentDiv = document.getElementById('content');
        const urlParams = new URLSearchParams(window.location.search);
        const postName = urlParams.get('post');

        async function init() {
            if (postName) {
                const res = await fetch(`https://api.github.com/repos/farahisofilms/farahiso/contents/blog/${postName}.md`);
                const data = await res.json();
                const text = await (await fetch(data.download_url)).text();
                const title = (text.match(/title:\s*["']?([^"'\n]+)["']?/) || [])[1] || "Sin título";
                const thumb = (text.match(/thumbnail:\s*["']?([^"'\n]+)["']?/) || [])[1] || "";
                const body = text.split('---').pop();
                
                contentDiv.innerHTML = `
                    <div class="post-single">
                        <a href="/blog" class="back-link">← Volver al Blog</a>
                        <h1>${title}</h1>
                        ${thumb ? `<img src="${thumb}" class="featured-img">` : ""}
                        <div class="post-body">${body.replace(/\n\n/g, '<p></p>')}</div>
                    </div>
                `;
            } else {
                contentDiv.className = "blog-wrapper-grey";
                const res = await fetch('https://api.github.com/repos/farahisofilms/farahiso/contents/blog');
                const files = await res.json();
                for (const file of files.filter(f => f.name.endsWith('.md'))) {
                    const contentRes = await fetch(file.download_url);
                    const text = await contentRes.text();
                    const title = (text.match(/title:\s*["']?([^"'\n]+)["']?/) || [])[1] || "Sin título";
                    const thumb = (text.match(/thumbnail:\s*["']?([^"'\n]+)["']?/) || [])[1] || "assets/img/hero.png";
                    contentDiv.innerHTML += `
                        <div class="blog-card">
                            <img src="${thumb}" alt="${title}">
                            <h3>${title}</h3>
                            <a href="?post=${file.name.replace('.md','')}" style="display:block; background:#000; color:#fff; padding:10px; text-decoration:none; text-align:center; margin-top:auto;">Leer más</a>
                        </div>
                    `;
                }
            }
        }
        init();
    </script>
</body>
</html>
