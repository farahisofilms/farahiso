<!DOCTYPE HTML>
<html>
	<head>
		<title>Blog | Farahiso Films</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="/assets/css/main.css" />
		<style>
			/* Ajustes de tipografía y encabezado */
			.header-brand { text-align: center; margin-bottom: 30px; }
			.header-brand h1 { font-size: 2.5em; margin: 0; color: #333; }
			.header-brand h2 { font-size: 1.8em; margin: 10px 0 0 0; text-transform: uppercase; letter-spacing: 2px; color: #333; border-bottom: 2px solid #333; display: inline-block; padding-bottom: 5px; }
			
			/* Rejilla de posts */
			.blog-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 50px; }
			.blog-card { background: #fff; padding: 25px; text-align: center; border: 1px solid #e0e0e0; }
			.blog-card img { width: 100%; height: 300px; object-fit: cover; margin-bottom: 20px; }
			
			/* Títulos y descripciones triplicados en tamaño */
			.blog-card h3 { font-size: 1.8em; margin: 15px 0; color: #222; }
			.blog-card p { font-size: 1.35em; color: #555; line-height: 1.6; }
			
			/* Botón Leer Más ajustado */
			.btn-read { display: inline-block; padding: 20px 40px; background: #555; color: #fff; text-decoration: none; font-size: 1.2em; font-weight: bold; margin-top: 20px; }
		</style>
	</head>
	<body class="is-preload">
		<div id="wrapper">
			<section id="main" class="wrapper">
				<div class="inner">
					
					<!-- Encabezado corregido -->
					<div class="header-brand">
						<h1>Farahiso Films</h1>
						<h2>BLOG</h2>
					</div>

					<div class="blog-container" id="posts"></div>
				</div>
			</section>
		</div>

		<script>
			async function loadPosts() {
				const container = document.getElementById('posts');
				const res = await fetch('https://api.github.com/repos/farahisofilms/farahiso/contents/blog');
				const files = await res.json();
				
				for (const file of files.filter(f => f.name.endsWith('.md'))) {
					const contentRes = await fetch(file.download_url);
					const text = await contentRes.text();
					
					const title = (text.match(/title:\s*["']?([^"'\n]+)["']?/) || [])[1] || "Sin título";
					const desc = (text.match(/description:\s*["']?([^"'\n]+)["']?/) || [])[1] || "Descripción pendiente...";
					const thumb = (text.match(/thumbnail:\s*["']?([^"'\n]+)["']?/) || [])[1] || "/assets/images/pic01.jpg";
					
					container.innerHTML += `
						<div class="blog-card">
							<img src="${thumb}" alt="${title}">
							<h3>${title}</h3>
							<p>${desc}</p>
							<a href="/blog/${file.name.replace('.md','')}" class="btn-read">Leer más</a>
						</div>
					`;
				}
			}
			loadPosts();
		</script>
	</body>
</html>
