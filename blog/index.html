<!DOCTYPE HTML>
<html>
	<head>
		<title>Blog | Farahiso Films</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="/assets/css/main.css" />
		<style>
			.main-wrapper { max-width: 1200px; margin: 0 auto; padding: 50px 20px; }
			.header-brand { text-align: center; margin-bottom: 60px; }
			.header-brand h1 { font-size: 2.5em; margin: 0; color: #000; font-weight: bold; }
			.header-brand h2 { font-size: 1.8em; margin: 10px auto; text-transform: uppercase; letter-spacing: 2px; color: #333; border-bottom: 2px solid #333; display: inline-block; padding-bottom: 5px; }
			
			/* EL CONTENEDOR GRIS */
			.blog-wrapper-grey { 
                background: #999; /* El gris del marco que querías */
                padding: 40px; 
                display: grid; 
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
                gap: 30px; 
            }
			
			/* LAS TARJETAS BLANCAS DENTRO DEL MARCO */
			.blog-card { 
                background: #fff; 
                padding: 30px; 
                display: flex; flex-direction: column; 
                height: 100%; 
            }
			.blog-card img { width: 100%; height: 300px; object-fit: contain; margin-bottom: 20px; }
			.card-content { flex-grow: 1; display: flex; flex-direction: column; }
			.blog-card h3 { font-size: 1.8em; margin: 15px 0; color: #222; }
			.blog-card p { font-size: 1.35em; color: #555; line-height: 1.6; margin-bottom: 20px; }
			
			.btn-read { 
                display: inline-block; padding: 15px 30px; background: #444; color: #fff; 
                text-decoration: none; font-size: 1.1em; font-weight: bold; margin-top: auto; align-self: center;
            }
		</style>
	</head>
	<body class="is-preload">
		<div id="wrapper">
			<div class="main-wrapper">
				<div class="header-brand">
					<h1>Farahiso Films</h1>
					<h2>BLOG</h2>
				</div>
                
                <!-- Aquí está el contenedor con el fondo gris que une todo -->
				<div class="blog-wrapper-grey" id="posts"></div>
			</div>
		</div>

		<script>
			async function loadPosts() {
				const container = document.getElementById('posts');
				const res = await fetch('https://api.github.com/repos/farahisofilms/farahiso/contents/blog');
				const files = await res.json();
				
				for (const file of files.filter(f => f.name.endsWith('.md'))) {
					const contentRes = await fetch(file.download_url);
					const text = await contentRes.text();
					const title = (text.match(/title:\s*["']?([^"'\n]+)["']?/) || [])[1] || "Sin título";
					const desc = (text.match(/description:\s*["']?([^"'\n]+)["']?/) || [])[1] || "Descripción pendiente...";
					const thumb = (text.match(/thumbnail:\s*["']?([^"'\n]+)["']?/) || [])[1] || "/assets/images/pic01.jpg";
					
					container.innerHTML += `
						<div class="blog-card">
							<img src="${thumb}" alt="${title}">
							<div class="card-content">
                                <h3>${title}</h3>
                                <p>${desc}</p>
                                <a href="/blog/${file.name.replace('.md','')}" class="btn-read">Leer más</a>
                            </div>
						</div>
					`;
				}
			}
			loadPosts();
		</script>
	</body>
</html>
