<!DOCTYPE HTML>
<html lang="es">
<head>
    <title>Blog | Farahiso Films</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #fff; margin: 0; padding: 0; }
        .main-wrapper { max-width: 900px; margin: 0 auto; padding: 50px 20px; }
        
        /* Cabecera */
        .header-brand { text-align: center; margin-bottom: 40px; }
        .header-brand h1 { font-size: 2.5em; margin: 0; color: #000; font-weight: 300; }
        .header-brand h1 strong { font-weight: 700; }
        .header-brand h2 { font-size: 1.2em; margin: 10px auto; color: #666; letter-spacing: 2px; }
        
        /* Estilo Post */
        .post-layout { display: flex; gap: 40px; align-items: flex-start; margin-top: 40px; }
        .post-logo { width: 300px; flex-shrink: 0; }
        .post-logo img { width: 100%; }
        .post-main h1 { font-size: 3em; margin: 0 0 20px 0; }
        .post-body { font-size: 1.1em; line-height: 1.8; color: #333; }
        .back-link { display: block; margin-bottom: 20px; font-weight: bold; text-decoration: none; color: #000; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="header-brand">
            <a href="/" style="text-decoration: none; color: inherit;"><h1><strong>Farahiso</strong> Films</h1></a>
            <div style="border-top: 1px solid #000; width: 50px; margin: 10px auto;"></div>
            <a href="/blog" style="text-decoration: none; color: #666;">BLOG</a>
        </div>
        
        <div id="content"></div>
    </div>

    <script>
        const contentDiv = document.getElementById('content');
        const urlParams = new URLSearchParams(window.location.search);
        const post = urlParams.get('post');

        async function init() {
            if (post) {
                const res = await fetch(`https://api.github.com/repos/farahisofilms/farahiso/contents/blog/${post}.md`);
                const data = await res.json();
                const text = await (await fetch(data.download_url)).text();
                const title = text.match(/title:\s*["']?([^"'\n]+)["']?/)[1];
                const body = text.split('---').pop();
                
                contentDiv.innerHTML = `
                    <a href="/blog" class="back-link">← Volver al Blog</a>
                    <div class="post-layout">
                        <div class="post-logo"><img src="/assets/img/logo.png" alt="Logo"></div>
                        <div class="post-main">
                            <h1>${title}</h1>
                            <div class="post-body">${body.replace(/\n/g, '<br>')}</div>
                        </div>
                    </div>
                `;
            } else {
                // Aquí iría tu lógica de grid si no hay post seleccionado
                contentDiv.innerHTML = "<p>Selecciona una entrada...</p>";
            }
        }
        init();
    </script>
</body>
</html>
