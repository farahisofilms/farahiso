<!DOCTYPE HTML>
<html>
<head>
    <title>Blog | Farahiso Films</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
</head>
<body style="background-color: #f0f0f0; margin: 0; padding: 0;">

    <div style="max-width: 1200px; margin: 0 auto; padding: 50px 20px; text-align: center;">
        <h1 style="font-size: 2.5em; color: #000;">Farahiso Films</h1>
        <h2 style="font-size: 1.8em; border-bottom: 2px solid #333; display: inline-block;">BLOG</h2>
    </div>

    <!-- Contenedor gris con separación forzada -->
    <div id="posts" style="background-color: #999; padding: 40px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; max-width: 1200px; margin: 0 auto;">
        <!-- Los posts aparecerán aquí -->
    </div>

    <script>
        async function loadPosts() {
            const container = document.getElementById('posts');
            try {
                const res = await fetch('https://api.github.com/repos/farahisofilms/farahiso/contents/blog');
                const files = await res.json();
                
                for (const file of files.filter(f => f.name.endsWith('.md'))) {
                    const contentRes = await fetch(file.download_url);
                    const text = await contentRes.text();
                    
                    const title = (text.match(/title:\s*["']?([^"'\n]+)["']?/) || [])[1] || "Sin título";
                    const desc = (text.match(/description:\s*["']?([^"'\n]+)["']?/) || [])[1] || "Haz clic para leer más.";
                    const thumb = (text.match(/thumbnail:\s*["']?([^"'\n]+)["']?/) || [])[1] || "/assets/images/pic01.jpg";
                    
                    container.innerHTML += `
                        <div style="background-color: white; padding: 30px; display: flex; flex-direction: column;">
                            <img src="${thumb}" style="width: 100%; height: 200px; object-fit: cover;">
                            <h3 style="margin: 15px 0;">${title}</h3>
                            <p style="flex-grow: 1;">${desc}</p>
                            <a href="/blog/${file.name.replace('.md','')}" style="background: #444; color: white; padding: 15px; text-decoration: none; margin-top: 20px;">Leer más</a>
                        </div>
                    `;
                }
            } catch (e) {
                console.error("Error cargando:", e);
            }
        }
        loadPosts();
    </script>
</body>
</html>
